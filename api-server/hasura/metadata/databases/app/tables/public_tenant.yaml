              - user:
                  _eq: X-Hasura-User-Id
              - tenant:
                  _eq: X-Hasura-User-Tenant-Id
      limit: 100
    comment: ""
update_permissions:
  - role: tenant_admin
    permission:
      columns:
        - name
      filter:
        id:
          _eq: X-Hasura-User-Tenant-Id
      check: null
      set:
        updated_at: now()
        updated_by: x-hasura-user-id
    comment: ""
