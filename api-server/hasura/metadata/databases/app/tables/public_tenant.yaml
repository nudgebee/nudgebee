select_permissions:
  - role: account_admin
    permission:
      columns:
        - created_at
        - id
        - name
        - type
        - updated_at
      filter:
        _exists:
          _table:
            name: tenant_users
            schema: public
          _where:
            _or:
              - user:
                  _eq: X-Hasura-User-Id
              - tenant:
                  _eq: X-Hasura-User-Tenant-Id
      limit: 100
  - role: account_admin_readonly
    permission:
      columns:
        - created_at
        - id
        - name
