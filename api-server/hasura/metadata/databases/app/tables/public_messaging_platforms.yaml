table:
  name: messaging_platforms
  schema: public
insert_permissions:
  - role: tenant_admin
    permission:
      check:
        tenant_id:
          _eq: X-Hasura-User-Tenant-Id
      columns:
        - channels
    comment: ""
select_permissions:
  - role: account_admin
    permission:
      columns:
        - app_id
        - bot_id
        - channels
        - client_id
        - created_at
        - created_by
        - id
        - platform
        - team_id
        - team_name
        - tenant_id
        - updated_at
        - updated_by
        - username
      filter:
        tenant_id:
          _eq: X-Hasura-User-Tenant-Id
    comment: ""
