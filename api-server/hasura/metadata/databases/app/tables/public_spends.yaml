table:
  name: spends
  schema: public
object_relationships:
  - name: cloudAccountByCloudAccount
    using:
      foreign_key_constraint_on: cloud_account
  - name: cloud_resourse
    using:
      foreign_key_constraint_on: cloud_resource_id
  - name: tenantByTenant
    using:
      foreign_key_constraint_on: tenant
select_permissions:
  - role: account_admin
    permission:
      columns:
        - exclude_aggregate
        - amount
        - tags
        - unit
        - date
        - business_unit
        - cloud_account
        - cloud_resource_id
        - id
        - tenant
      filter:
        _and:
          - tenant:
              _eq: X-Hasura-User-Tenant-Id
          - cloud_account:
              _in: X-Hasura-User-Account-Ids
      limit: 100
      allow_aggregations: true
    comment: ""
  - role: account_admin_readonly
    permission:
      columns:
        - exclude_aggregate
        - amount
        - tags
        - unit
        - date
        - business_unit
        - cloud_account
        - cloud_resource_id
        - id
        - tenant
      filter:
        _and:
          - tenant:
              _eq: X-Hasura-User-Tenant-Id
          - cloud_account:
              _in: X-Hasura-User-Readonly-Account-Ids
      limit: 100
      allow_aggregations: true
    comment: ""
  - role: k8s_namespace_admin
    permission:
      columns:
        - exclude_aggregate
        - amount
        - tags
        - unit
        - date
        - business_unit
        - cloud_account
        - cloud_resource_id
        - id
        - tenant
      filter:
        _and:
          - tenant:
              _eq: X-Hasura-User-Tenant-Id
          - cloud_account:
              _in: x-hasura-user-namespaced-account-ids
      limit: 100
      allow_aggregations: true
    comment: ""
  - role: k8s_namespace_admin_readonly
    permission:
      columns:
        - exclude_aggregate
        - amount
        - tags
        - unit
        - date
        - business_unit
        - cloud_account
        - cloud_resource_id
        - id
        - tenant
      filter:
        _and:
          - tenant:
              _eq: X-Hasura-User-Tenant-Id
          - cloud_account:
              _in: x-hasura-user-namespaced-readonly-account-ids
      limit: 100
      allow_aggregations: true
    comment: ""
  - role: tenant_admin
    permission:
      columns:
        - exclude_aggregate
        - amount
        - tags
        - unit
        - date
        - business_unit
        - cloud_account
        - cloud_resource_id
        - id
        - tenant
      filter:
        tenant:
          _eq: X-Hasura-User-Tenant-Id
      allow_aggregations: true
  - role: tenant_admin_readonly
    permission:
      columns:
        - exclude_aggregate
        - amount
        - tags
        - unit
        - date
        - business_unit
        - cloud_account
        - cloud_resource_id
        - id
        - tenant
      filter:
        tenant:
          _eq: X-Hasura-User-Tenant-Id
      allow_aggregations: true
