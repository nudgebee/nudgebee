table:
  name: llm_conversation_tool_calls
  schema: public
object_relationships:
  - name: llm_conversation
    using:
      foreign_key_constraint_on: conversation_id
  - name: llm_conversation_agent
    using:
      foreign_key_constraint_on: agent_id
  - name: llm_conversation_message
    using:
      foreign_key_constraint_on: message_id
select_permissions:
  - role: account_admin
    permission:
      columns:
        - account_id
        - agent_id
        - child_agent_id
        - conversation_id
        - created_at
        - id
        - message_id
        - parameters
        - references
        - response
        - status
        - thought
        - tool_id
        - tool_name
        - tool_type
        - updated_at
        - user_id
      filter:
        account_id:
          _in: X-Hasura-User-Account-Ids
      limit: 100
    comment: ""
  - role: account_admin_readonly
    permission:
      columns:
        - account_id
        - agent_id
        - child_agent_id
        - conversation_id
        - created_at
        - id
        - message_id
        - parameters
        - references
        - response
        - status
        - thought
        - tool_id
        - tool_name
        - tool_type
        - updated_at
        - user_id
      filter:
        account_id:
          _in: X-Hasura-User-Readonly-Account-Ids
      limit: 100
    comment: ""
  - role: k8s_namespace_admin
    permission:
      columns:
        - account_id
        - agent_id
        - child_agent_id
        - conversation_id
        - created_at
        - id
        - message_id
        - parameters
        - references
        - response
        - status
        - thought
        - tool_id
        - tool_name
        - tool_type
        - updated_at
        - user_id
      filter:
        account_id:
          _in: x-hasura-user-namespaced-account-ids
      limit: 100
    comment: ""
  - role: k8s_namespace_admin_readonly
    permission:
      columns:
        - account_id
        - agent_id
        - child_agent_id
        - conversation_id
        - created_at
        - id
        - message_id
        - parameters
        - references
        - response
        - status
        - thought
        - tool_id
        - tool_name
        - tool_type
        - updated_at
        - user_id
      filter:
        account_id:
          _in: x-hasura-user-namespaced-readonly-account-ids
      limit: 100
    comment: ""
  - role: tenant_admin
    permission:
      columns:
        - account_id
        - agent_id
        - child_agent_id
        - conversation_id
        - created_at
        - id
        - message_id
        - parameters
        - references
        - response
        - status
        - thought
        - tool_id
        - tool_name
        - tool_type
        - updated_at
        - user_id
      filter:
        llm_conversation:
          tenant_id:
            _eq: X-Hasura-User-Tenant-Id
      limit: 100
    comment: ""
  - role: tenant_admin_readonly
    permission:
      columns:
        - account_id
        - agent_id
        - child_agent_id
        - conversation_id
        - created_at
        - id
        - message_id
        - parameters
        - references
        - response
        - status
        - thought
        - tool_id
        - tool_name
        - tool_type
        - updated_at
        - user_id
      filter:
        llm_conversation:
          tenant_id:
            _eq: X-Hasura-User-Tenant-Id
      limit: 100
    comment: ""
