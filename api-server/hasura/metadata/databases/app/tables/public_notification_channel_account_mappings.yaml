table:
  name: notification_channel_account_mappings
  schema: public
object_relationships:
  - name: cloud_account
    using:
      foreign_key_constraint_on: account_id
  - name: user_created_by
    using:
      foreign_key_constraint_on: created_by
  - name: user_updated_by
    using:
      foreign_key_constraint_on: updated_by
insert_permissions:
  - role: account_admin
    permission:
      check:
        tenant_id:
          _eq: X-Hasura-User-Tenant-Id
      set:
        created_by: x-hasura-user-id
        tenant_id: x-hasura-User-Tenant-Id
        updated_by: x-hasura-user-id
      columns:
        - account_id
        - channel_id
        - channel_metadata
        - platform
        - team_id
        - updated_at
    comment: ""
  - role: tenant_admin
    permission:
      check:
        tenant_id:
          _eq: X-Hasura-User-Tenant-Id
      set:
        created_by: x-hasura-user-id
        tenant_id: x-hasura-User-Tenant-Id
        updated_by: x-hasura-user-id
      columns:
        - account_id
        - channel_id
        - created_by
        - channel_metadata
        - platform
        - team_id
    comment: ""
select_permissions:
  - role: account_admin
    permission:
      columns:
        - channel_id
        - channel_metadata
        - platform
        - team_id
        - created_at
        - updated_at
        - account_id
        - created_by
        - id
        - tenant_id
        - updated_by
      filter:
        tenant_id:
          _eq: X-Hasura-User-Tenant-Id
    comment: ""
  - role: tenant_admin
    permission:
      columns:
        - channel_id
        - channel_metadata
        - platform
        - team_id
        - created_at
        - updated_at
        - account_id
        - created_by
        - id
        - tenant_id
        - updated_by
      filter:
        tenant_id:
          _eq: X-Hasura-User-Tenant-Id
    comment: ""
update_permissions:
  - role: account_admin
    permission:
      columns:
        - account_id
        - channel_id
        - channel_metadata
        - platform
        - team_id
      filter:
        tenant_id:
          _eq: X-Hasura-User-Tenant-Id
      check:
        tenant_id:
          _eq: X-Hasura-User-Tenant-Id
      set:
        updated_by: x-hasura-user-id
    comment: ""
  - role: tenant_admin
    permission:
      columns:
        - account_id
        - channel_id
        - channel_metadata
        - platform
        - team_id
      filter:
        tenant_id:
          _eq: X-Hasura-User-Tenant-Id
      check:
        tenant_id:
          _eq: X-Hasura-User-Tenant-Id
      set:
        updated_by: x-hasura-user-id
    comment: ""
delete_permissions:
  - role: account_admin
    permission:
      filter:
        tenant_id:
          _eq: X-Hasura-User-Tenant-Id
    comment: ""
  - role: tenant_admin
    permission:
      filter:
        tenant_id:
          _eq: X-Hasura-User-Tenant-Id
    comment: ""
