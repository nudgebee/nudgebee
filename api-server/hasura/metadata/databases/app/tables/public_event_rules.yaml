        - metric_provider
        - metric_provider_source
        - name
        - namespace
        - provider_config
        - severity
        - source
        - tenant_id
        - updated_at
        - updated_by
      filter:
        _and:
          - tenant_id:
              _eq: X-Hasura-User-Tenant-Id
          - account_id:
              _in: X-Hasura-User-Readonly-Account-Ids
      limit: 100
      allow_aggregations: true
    comment: ""
  - role: tenant_admin
