    permission:
      columns:
        - is_active
        - cost
        - cpu_allocatable
        - cpu_capacity
        - cpu_limits
        - memory_allocatable
        - memory_capacity
        - memory_limits
        - labels
        - meta
        - conditions
        - external_ip
        - internal_ip
        - name
        - node_flavor
        - node_region
        - node_type
        - node_zone
