table:
  name: roles
  schema: public
array_relationships:
  - name: group_roles
    using:
      foreign_key_constraint_on:
        column: role
        table:
          name: group_roles
          schema: public
  - name: user_roles
    using:
      foreign_key_constraint_on:
        column: role
        table:
          name: user_roles
          schema: public
