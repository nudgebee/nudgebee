table:
  name: business_unit
  schema: public
object_relationships:
- name: business_unit
  using:
    foreign_key_constraint_on: parent_business_unit
- name: tenantByTenant
  using:
    foreign_key_constraint_on: tenant
- name: user
  using:
    foreign_key_constraint_on: created_by
- name: userByUpdatedBy
  using:
    foreign_key_constraint_on: updated_by
array_relationships:
- name: business_units
  using:
    foreign_key_constraint_on:
      column: parent_business_unit
      table:
        name: business_unit
        schema: public
- name: businessunit_funding_sources
  using:
    foreign_key_constraint_on:
      column: business_unit
      table:
        name: businessunit_funding
        schema: public
- name: projects
  using:
    foreign_key_constraint_on:
      column: business_unit
      table:
        name: projects
        schema: public
- name: spends
  using:
    foreign_key_constraint_on:
      column: business_unit
      table:
        name: spends
        schema: public
- name: user_groups
  using:
    foreign_key_constraint_on:
      column: business_unit
      table:
        name: user_groups
        schema: public
insert_permissions:
- role: tenant_admin
  permission:
    check: {}
    set:
      created_by: x-hasura-User-Id
      tenant: x-hasura-User-Tenant-Id
      updated_by: x-hasura-User-Id
    columns:
    - description
    - name
    - parent_business_unit
update_permissions:
- role: tenant_admin
  permission:
    columns:
    - description
    - name
    - parent_business_unit
    filter:
      tenant:
        _eq: X-Hasura-User-Tenant-Id
    check: null
    set:
      updated_by: x-hasura-User-Id
delete_permissions:
- role: tenant_admin
  permission:
    filter:
      tenant:
        _eq: X-Hasura-User-Tenant-Id
