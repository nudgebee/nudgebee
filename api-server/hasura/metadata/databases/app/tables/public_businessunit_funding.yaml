table:
  name: businessunit_funding
  schema: public
object_relationships:
- name: businessUnitByBusinessUnit
  using:
    foreign_key_constraint_on: business_unit
- name: fundingSourceByFundingSource
  using:
    foreign_key_constraint_on: funding_source
- name: tenantByTenant
  using:
    foreign_key_constraint_on: tenant
- name: user
  using:
    foreign_key_constraint_on: created_by
- name: userByUpdatedBy
  using:
    foreign_key_constraint_on: updated_by
array_relationships:
- name: project_fundings
  using:
    foreign_key_constraint_on:
      column: businessunit_funding
      table:
        name: project_fundings
        schema: public
