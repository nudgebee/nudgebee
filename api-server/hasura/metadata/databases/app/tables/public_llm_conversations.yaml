table:
  name: llm_conversations
  schema: public
object_relationships:
  - name: user
    using:
      foreign_key_constraint_on: user_id
array_relationships:
  - name: llm_conversation_agents
    using:
      foreign_key_constraint_on:
        column: conversation_id
        table:
          name: llm_conversation_agent
          schema: public
  - name: llm_conversation_messages
    using:
      foreign_key_constraint_on:
        column: conversation_id
        table:
          name: llm_conversation_messages
          schema: public
  - name: llm_conversation_saveds
    using:
      foreign_key_constraint_on:
        column: conversation_id
        table:
          name: llm_conversation_saved
          schema: public
  - name: llm_conversation_tool_calls
    using:
      foreign_key_constraint_on:
        column: conversation_id
        table:
          name: llm_conversation_tool_calls
          schema: public
select_permissions:
  - role: account_admin
    permission:
      columns:
        - account_id
        - context
        - created_at
        - id
        - session_id
        - source
        - status
        - title
        - updated_at
        - user_id
      filter:
        account_id:
          _in: X-Hasura-User-Account-Ids
      limit: 100
      allow_aggregations: true
    comment: ""
  - role: account_admin_readonly
    permission:
      columns:
        - account_id
        - context
        - created_at
        - id
        - session_id
        - source
        - status
        - title
        - updated_at
        - user_id
      filter:
        account_id:
          _in: X-Hasura-User-Readonly-Account-Ids
      limit: 100
      allow_aggregations: true
    comment: ""
  - role: k8s_namespace_admin
    permission:
      columns:
        - account_id
        - context
        - created_at
        - id
        - session_id
        - source
        - status
        - title
        - updated_at
        - user_id
      filter:
        account_id:
          _in: x-hasura-user-namespaced-account-ids
      limit: 100
      allow_aggregations: true
    comment: ""
  - role: k8s_namespace_admin_readonly
    permission:
      columns:
        - account_id
        - context
        - created_at
        - id
        - session_id
        - source
        - status
        - title
        - updated_at
        - user_id
      filter:
        account_id:
          _in: x-hasura-user-namespaced-readonly-account-ids
      limit: 100
      allow_aggregations: true
    comment: ""
  - role: tenant_admin
    permission:
      columns:
        - account_id
        - context
        - created_at
        - id
        - session_id
        - source
        - status
        - title
        - updated_at
        - user_id
      filter:
        tenant_id:
          _eq: X-Hasura-User-Tenant-Id
      limit: 100
      allow_aggregations: true
    comment: ""
  - role: tenant_admin_readonly
    permission:
      columns:
        - account_id
        - context
        - created_at
        - id
        - session_id
        - source
        - status
        - title
        - updated_at
        - user_id
      filter:
        tenant_id:
          _eq: X-Hasura-User-Tenant-Id
      limit: 100
      allow_aggregations: true
    comment: ""
