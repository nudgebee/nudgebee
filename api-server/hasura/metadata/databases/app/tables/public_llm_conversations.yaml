table:
  name: llm_conversations
  schema: public
object_relationships:
- name: user
  using:
    foreign_key_constraint_on: user_id
array_relationships:
- name: llm_conversation_agents
  using:
    foreign_key_constraint_on:
      column: conversation_id
      table:
        name: llm_conversation_agent
        schema: public
- name: llm_conversation_messages
  using:
    foreign_key_constraint_on:
      column: conversation_id
      table:
        name: llm_conversation_messages
        schema: public
- name: llm_conversation_saveds
  using:
    foreign_key_constraint_on:
      column: conversation_id
      table:
        name: llm_conversation_saved
        schema: public
- name: llm_conversation_tool_calls
  using:
    foreign_key_constraint_on:
      column: conversation_id
      table:
        name: llm_conversation_tool_calls
        schema: public
