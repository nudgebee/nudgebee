        - status
        - tenant
        - tool
        - updated_at
        - updated_by
        - url
        - username
        - users
      filter:
        tenant:
          _eq: X-Hasura-User-Tenant-Id
      allow_aggregations: true
update_permissions:
  - role: tenant_admin
    permission:
      columns:
        - auth_type
        - id
        - is_active
        - last_connected
        - name
        - password
        - status
        - updated_at
        - updated_by
        - url
        - username
      filter:
        tenant:
          _eq: X-Hasura-User-Tenant-Id
      check:
        tenant:
          _eq: X-Hasura-User-Tenant-Id
      set:
        updated_by: x-hasura-User-Id
delete_permissions:
  - role: tenant_admin
    permission:
      filter:
        tenant:
          _eq: X-Hasura-User-Tenant-Id
