table:
  name: jira_configurations
  schema: public
object_relationships:
  - name: tenantByTenant
    using:
      foreign_key_constraint_on: tenant
  - name: user
    using:
      foreign_key_constraint_on: created_by
  - name: userByUpdatedBy
    using:
      foreign_key_constraint_on: updated_by
select_permissions:
  - role: account_admin
    permission:
      columns:
        - auth_type
        - created_at
        - created_by
        - id
        - is_active
        - last_connected
        - name
        - priorities
        - projects
        - status
        - tenant
        - tool
        - updated_at
        - updated_by
        - url
        - username
        - users
      filter:
        tenant:
          _eq: X-Hasura-User-Tenant-Id
      allow_aggregations: true
  - role: account_admin_readonly
    permission:
      columns:
        - auth_type
        - created_at
        - created_by
        - id
        - is_active
        - last_connected
        - name
        - priorities
        - projects
        - status
        - tenant
        - tool
        - updated_at
        - updated_by
        - url
        - username
        - users
      filter:
        tenant:
          _eq: X-Hasura-User-Tenant-Id
      allow_aggregations: true
