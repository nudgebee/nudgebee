        - tool
        - updated_at
        - updated_by
        - url
        - username
        - users
      filter:
        tenant:
          _eq: X-Hasura-User-Tenant-Id
      allow_aggregations: true
  - role: tenant_admin_readonly
    permission:
      columns:
        - auth_type
        - created_at
        - created_by
        - id
        - is_active
        - last_connected
        - name
        - priorities
