table:
  name: funding_sources
  schema: public
object_relationships:
- name: tenantByTenant
  using:
    foreign_key_constraint_on: tenant
- name: user
  using:
    foreign_key_constraint_on: created_by
- name: userByUpdatedBy
  using:
    foreign_key_constraint_on: updated_by
- name: user_group
  using:
    foreign_key_constraint_on: user_groups
array_relationships:
- name: businessunit_funding_sources
  using:
    foreign_key_constraint_on:
      column: funding_source
      table:
        name: businessunit_funding
        schema: public
- name: ownersById
  using:
    manual_configuration:
      column_mapping:
        owners: id
      insertion_order:
      remote_table:
        name: users
        schema: public
