table:
  name: feature
  schema: public
is_enum: true
array_relationships:
  - name: feature_flags
    using:
      foreign_key_constraint_on:
        column: feature_id
        table:
          name: feature_flag
          schema: public
select_permissions:
  - role: account_admin
    permission:
      columns:
        - description
        - value
      filter:
        feature_flags:
          tenant_id:
            _eq: X-Hasura-User-Tenant-Id
      limit: 100
    comment: ""
  - role: account_admin_readonly
    permission:
      columns:
        - description
        - value
      filter:
        feature_flags:
          tenant_id:
            _eq: X-Hasura-User-Tenant-Id
      limit: 100
    comment: ""
  - role: k8s_namespace_admin
    permission:
      columns:
        - description
        - value
      filter:
        feature_flags:
          tenant_id:
            _eq: X-Hasura-User-Tenant-Id
      limit: 100
    comment: ""
  - role: k8s_namespace_admin_readonly
    permission:
      columns:
        - description
        - value
      filter:
        feature_flags:
          tenant_id:
            _eq: X-Hasura-User-Tenant-Id
      limit: 100
    comment: ""
  - role: tenant_admin
    permission:
      columns:
        - description
        - value
      filter: {}
      limit: 100
    comment: ""
  - role: tenant_admin_readonly
    permission:
      columns:
        - description
        - value
      filter: {}
      limit: 100
    comment: ""
