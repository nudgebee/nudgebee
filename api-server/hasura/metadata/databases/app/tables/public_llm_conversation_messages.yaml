table:
  name: llm_conversation_messages
  schema: public
object_relationships:
- name: llm_conversation
  using:
    foreign_key_constraint_on: conversation_id
- name: user
  using:
    foreign_key_constraint_on: user_id
array_relationships:
- name: llm_conversation_agents
  using:
    foreign_key_constraint_on:
      column: message_id
      table:
        name: llm_conversation_agent
        schema: public
- name: llm_conversation_tool_calls
  using:
    foreign_key_constraint_on:
      column: message_id
      table:
        name: llm_conversation_tool_calls
        schema: public
