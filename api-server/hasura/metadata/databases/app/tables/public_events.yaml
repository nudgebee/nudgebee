table:
  name: events
  schema: public
object_relationships:
  - name: cloud_account
    using:
      foreign_key_constraint_on: cloud_account_id
  - name: event_severity
    using:
      foreign_key_constraint_on: priority
  - name: event_source
    using:
      foreign_key_constraint_on: source
select_permissions:
  - role: account_admin
    permission:
      columns:
        - aggregation_key
        - category
        - cloud_account_id
        - cloud_resource_id
        - cluster
        - computed_priority
        - computed_score
        - created_at
        - description
        - ends_at
        - evidences
        - failure
        - finding_id
        - finding_type
        - fingerprint
        - id
        - labels
        - nb_status
        - snoozed_until
        - principal
        - priority
        - score_confidence
        - score_factors
        - service_key
        - source
        - starts_at
        - status
        - subject_name
        - subject_namespace
        - subject_node
        - subject_owner
        - subject_owner_kind
        - subject_type
        - tenant
        - title
        - updated_at
      filter:
        _and:
          - tenant:
              _eq: X-Hasura-User-Tenant-Id
          - cloud_account_id:
              _in: X-Hasura-User-Account-Ids
      limit: 1200
      allow_aggregations: true
    comment: ""
