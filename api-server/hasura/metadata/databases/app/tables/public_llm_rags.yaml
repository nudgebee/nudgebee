table:
  name: llm_rags
  schema: public
object_relationships:
  - name: cloud_account
    using:
      foreign_key_constraint_on: account_id
  - name: tenant
    using:
      foreign_key_constraint_on: tenant_id
  - name: userCreatedBy
    using:
      foreign_key_constraint_on: created_by
  - name: userUpdatedBy
    using:
      foreign_key_constraint_on: updated_by
insert_permissions:
  - role: account_admin
    permission:
      check:
        _and:
          - tenant_id:
              _eq: X-Hasura-User-Tenant-Id
          - account_id:
              _in: X-Hasura-User-Account-Ids
      columns:
        - agent_id
        - data
        - created_at
        - updated_at
        - account_id
        - created_by
        - id
        - tenant_id
        - updated_by
    comment: ""
  - role: tenant_admin
    permission:
      check:
        tenant_id:
          _eq: X-Hasura-User-Tenant-Id
      columns:
        - agent_id
        - data
        - created_at
        - updated_at
        - account_id
        - created_by
        - id
        - tenant_id
        - updated_by
    comment: ""
select_permissions:
  - role: account_admin
    permission:
      columns:
        - agent_id
        - data_filename
        - data_format
        - data
        - created_at
        - updated_at
        - account_id
        - created_by
        - id
        - tenant_id
        - updated_by
      filter:
        _and:
          - tenant_id:
              _eq: X-Hasura-User-Tenant-Id
          - account_id:
              _in: X-Hasura-User-Account-Ids
      limit: 100
      allow_aggregations: true
    comment: ""
  - role: account_admin_readonly
    permission:
      columns:
        - agent_id
        - data_filename
        - data_format
        - data
        - created_at
