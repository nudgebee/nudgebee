table:
  name: notifications
  schema: public
object_relationships:
- name: notification_severity_type
  using:
    foreign_key_constraint_on: severity
- name: tenantByTenant
  using:
    foreign_key_constraint_on: tenant
array_relationships:
- name: notification_users
  using:
    foreign_key_constraint_on:
      column: notification
      table:
        name: notification_user
        schema: public
