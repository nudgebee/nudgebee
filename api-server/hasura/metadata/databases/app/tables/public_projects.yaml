table:
  name: projects
  schema: public
object_relationships:
- name: businessUnitByBusinessUnit
  using:
    foreign_key_constraint_on: business_unit
- name: project_category_type
  using:
    foreign_key_constraint_on: category
- name: tenantByTenant
  using:
    foreign_key_constraint_on: tenant
- name: user
  using:
    foreign_key_constraint_on: created_by
- name: userByUpdatedBy
  using:
    foreign_key_constraint_on: updated_by
array_relationships:
- name: project_accounts
  using:
    foreign_key_constraint_on:
      column: project_id
      table:
        name: project_accounts
        schema: public
- name: project_fundings
  using:
    foreign_key_constraint_on:
      column: project
      table:
        name: project_fundings
        schema: public
