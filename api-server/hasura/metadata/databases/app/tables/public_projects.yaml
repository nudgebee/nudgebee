table:
  name: projects
  schema: public
object_relationships:
  - name: businessUnitByBusinessUnit
    using:
      foreign_key_constraint_on: business_unit
  - name: project_category_type
    using:
      foreign_key_constraint_on: category
  - name: tenantByTenant
    using:
      foreign_key_constraint_on: tenant
  - name: user
    using:
      foreign_key_constraint_on: created_by
  - name: userByUpdatedBy
    using:
      foreign_key_constraint_on: updated_by
array_relationships:
  - name: project_accounts
    using:
      foreign_key_constraint_on:
        column: project_id
        table:
          name: project_accounts
          schema: public
  - name: project_fundings
    using:
      foreign_key_constraint_on:
        column: project
        table:
          name: project_fundings
          schema: public
insert_permissions:
  - role: tenant_admin
    permission:
      check:
        _and:
          - tenant:
              _eq: X-Hasura-User-Tenant-Id
          - businessUnitByBusinessUnit:
              tenant:
                _eq: X-Hasura-User-Tenant-Id
      set:
        created_by: x-hasura-User-Id
        tenant: x-hasura-User-Tenant-Id
        updated_by: x-hasura-User-Id
      columns:
        - approved_by
        - billable
        - business_unit
        - category
        - description
        - ended_at
        - expected_revenue
        - it_manager
        - name
        - project_manager
        - started_at
select_permissions:
  - role: tenant_admin
    permission:
      columns:
        - approved_by
        - billable
        - business_unit
        - category
        - created_at
        - created_by
        - description
        - ended_at
        - expected_revenue
        - id
        - it_manager
        - name
        - project_manager
        - started_at
        - tenant
        - updated_at
        - updated_by
      filter:
        tenant:
          _eq: X-Hasura-User-Tenant-Id
      allow_aggregations: true
  - role: tenant_admin_readonly
    permission:
      columns:
        - approved_by
        - billable
        - business_unit
        - category
        - created_at
        - created_by
        - description
        - ended_at
        - expected_revenue
        - id
        - it_manager
        - name
        - project_manager
        - started_at
        - tenant
        - updated_at
        - updated_by
      filter:
        tenant:
          _eq: X-Hasura-User-Tenant-Id
      allow_aggregations: true
update_permissions:
  - role: tenant_admin
    permission:
      columns:
        - approved_by
        - billable
        - business_unit
        - category
        - description
        - ended_at
        - expected_revenue
        - it_manager
        - name
        - project_manager
        - started_at
      filter:
        _and:
          - businessUnitByBusinessUnit:
              tenant:
                _eq: X-Hasura-User-Tenant-Id
      check: null
      set:
        tenant: x-hasura-User-Id
delete_permissions:
  - role: tenant_admin
    permission:
      filter:
        tenant:
          _eq: X-Hasura-User-Tenant-Id
