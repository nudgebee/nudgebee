table:
  name: runbook_action_library
  schema: public
array_relationships:
  - name: runbook_actions
    using:
      foreign_key_constraint_on:
        column: library_id
        table:
          name: runbook_action
          schema: public
select_permissions:
  - role: account_admin
    permission:
      columns:
        - created_at
        - id
        - library_name
      filter:
        _or:
          - tenant_id:
              _eq: X-Hasura-User-Tenant-Id
          - tenant_id:
              _eq: null
      limit: 100
    comment: ""
  - role: account_admin_readonly
    permission:
      columns:
        - created_at
        - id
        - library_name
      filter:
        _or:
          - tenant_id:
              _eq: X-Hasura-User-Tenant-Id
          - tenant_id:
              _eq: null
      limit: 100
      allow_aggregations: true
    comment: ""
  - role: k8s_namespace_admin
    permission:
      columns:
        - created_at
        - id
        - library_name
      filter:
        _or:
          - tenant_id:
              _eq: X-Hasura-User-Tenant-Id
          - tenant_id:
              _eq: null
      limit: 100
      allow_aggregations: true
    comment: ""
  - role: k8s_namespace_admin_readonly
    permission:
      columns:
        - created_at
        - id
        - library_name
      filter:
        _or:
          - tenant_id:
              _eq: X-Hasura-User-Tenant-Id
          - tenant_id:
              _eq: null
      limit: 100
      allow_aggregations: true
    comment: ""
  - role: tenant_admin
    permission:
      columns:
        - created_at
        - id
        - library_name
      filter:
        _or:
          - tenant_id:
              _eq: X-Hasura-User-Tenant-Id
          - tenant_id:
              _eq: null
      limit: 100
      allow_aggregations: true
    comment: ""
  - role: tenant_admin_readonly
    permission:
      columns:
        - created_at
        - id
        - library_name
      filter:
        _or:
          - tenant_id:
              _eq: X-Hasura-User-Tenant-Id
          - tenant_id:
              _eq: null
      limit: 100
      allow_aggregations: true
    comment: ""
