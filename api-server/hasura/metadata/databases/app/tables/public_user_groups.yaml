table:
  name: user_groups
  schema: public
object_relationships:
- name: businessUnitByBusinessUnit
  using:
    foreign_key_constraint_on: business_unit
- name: tenantByTenant
  using:
    foreign_key_constraint_on: tenant
- name: user
  using:
    foreign_key_constraint_on: owner
array_relationships:
- name: funding_sources
  using:
    foreign_key_constraint_on:
      column: user_groups
      table:
        name: funding_sources
        schema: public
- name: group_roles
  using:
    foreign_key_constraint_on:
      column: group_id
      table:
        name: group_roles
        schema: public
- name: usergroup_users
  using:
    foreign_key_constraint_on:
      column: group
      table:
        name: usergroup_users
        schema: public
insert_permissions:
- role: tenant_admin
  permission:
    check:
      tenant:
        _eq: X-Hasura-User-Tenant-Id
    set:
      owner: x-hasura-User-Id
      tenant: x-hasura-User-Tenant-Id
    columns:
    - business_unit
    - description
    - name
update_permissions:
- role: tenant_admin
  permission:
    columns:
    - business_unit
    - description
    - name
    - owner
    filter:
      tenant:
        _eq: X-Hasura-User-Tenant-Id
    check: null
delete_permissions:
- role: tenant_admin
  permission:
    filter:
      tenant:
        _eq: X-Hasura-User-Tenant-Id
