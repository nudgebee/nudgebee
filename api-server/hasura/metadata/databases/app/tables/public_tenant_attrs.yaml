table:
  name: tenant_attrs
  schema: public
object_relationships:
  - name: tenant
    using:
      foreign_key_constraint_on: tenant_id
select_permissions:
  - role: account_admin
    permission:
      columns:
        - id
        - name
        - value
      filter:
        tenant_id:
          _eq: X-Hasura-User-Tenant-Id
      limit: 98
    comment: ""
  - role: tenant_admin
    permission:
      columns:
        - id
        - name
        - tenant_id
        - value
      filter:
        tenant_id:
          _eq: X-Hasura-User-Tenant-Id
      limit: 100
      allow_aggregations: true
    comment: ""
  - role: tenant_admin_readonly
    permission:
      columns:
        - id
        - name
        - value
      filter:
        tenant_id:
          _eq: X-Hasura-User-Tenant-Id
      limit: 100
    comment: ""
  - role: tenant_usage
    permission:
      columns:
        - id
        - name
        - tenant_id
        - value
      filter:
        tenant_id:
          _eq: X-Hasura-User-Tenant-Id
      limit: 100
    comment: ""
delete_permissions:
  - role: tenant_admin
    permission:
      filter:
        tenant_id:
          _eq: X-Hasura-User-Tenant-Id
    comment: ""
