      filter:
        _and:
          - tenant_id:
              _eq: X-Hasura-User-Tenant-Id
      limit: 1000
      allow_aggregations: true
    comment: ""
  - role: tenant_admin_readonly
    permission:
      columns:
        - is_active
        - pod_count
        - workload_count
        - cloud_account_id
        - name
        - tenant_id
        - creation_time
        - updated_at
      filter:
        _and:
          - tenant_id:
              _eq: X-Hasura-User-Tenant-Id
      limit: 1000
      allow_aggregations: true
    comment: ""
