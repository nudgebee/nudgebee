table:
  name: auto_pilot_approvals
  schema: public
object_relationships:
- name: auto_pilot_approval_policy
  using:
    foreign_key_constraint_on: policy_id
- name: auto_pilot_approval_status
  using:
    foreign_key_constraint_on: status
- name: cloud_account
  using:
    foreign_key_constraint_on: account_id
- name: tenant
  using:
    foreign_key_constraint_on: tenant_id
- name: user_reviwer_id
  using:
    foreign_key_constraint_on: reviewer_id
update_permissions:
- role: tenant_admin
  permission:
    columns:
    - attributes
    - reviewer_comments
    - status
    filter:
      _and:
      - tenant_id:
          _eq: X-Hasura-User-Tenant-Id
    check:
      _and:
      - tenant_id:
          _eq: X-Hasura-User-Tenant-Id
    set:
      updated_at: now()
  comment: ''
