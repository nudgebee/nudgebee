table:
  name: usergroup_users
  schema: public
object_relationships:
- name: userByCreatedBy
  using:
    foreign_key_constraint_on: created_by
- name: userByUpdatedBy
  using:
    foreign_key_constraint_on: updated_by
- name: userByUser
  using:
    foreign_key_constraint_on: user
- name: user_group
  using:
    foreign_key_constraint_on: group
insert_permissions:
- role: tenant_admin
  permission:
    check:
      user_group:
        tenant:
          _eq: X-Hasura-User-Tenant-Id
    set:
      created_by: x-hasura-User-Id
      updated_by: x-hasura-User-Id
    columns:
    - group
    - user
delete_permissions:
- role: tenant_admin
  permission:
    filter:
      user_group:
        tenant:
          _eq: X-Hasura-User-Tenant-Id
