name: code-analysis-prod CI

on:
  workflow_dispatch:
  pull_request:
    branches: ["prod"]
    paths:
      - llm/code-analysis/**
      - .github/workflows/code-analysis-prod.yaml

jobs:
  lint:
    runs-on: [self-hosted, X64]

    strategy:
      matrix:
        go-version: ["1.26.x"]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go ${{ matrix.go-version }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache-dependency-path: ./llm/code-analysis/go.sum

      - name: Cache Go build
        uses: actions/cache@v4
        with:
          path: ~/.cache/go-build
          key: ${{ runner.os }}-go-build-code-analysis-${{ hashFiles('./llm/code-analysis/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-build-code-analysis-

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.9.0
          working-directory: ./llm/code-analysis
          args: --timeout 20m
