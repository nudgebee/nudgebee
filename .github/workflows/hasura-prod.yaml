name: Hasura-Prod CI

on:
  workflow_dispatch:
  pull_request:
    branches: [ "prod" ]
    paths: 
    - deploy/kubernetes/hasura/**
    - .github/workflows/hasura-prod.yaml


jobs:
  actions-build:
    runs-on: [self-hosted, X64]
    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0