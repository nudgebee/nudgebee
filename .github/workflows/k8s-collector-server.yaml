name: K8sCollector CI

on:
  workflow_dispatch:
  pull_request:
    branches: ['main']
    paths:
      - collector-server/k8s-collector/app/**
      - .github/workflows/k8s-collector-server.yaml

jobs:
  app-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      - name: Install Build Essentials
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential postgresql-server-dev-all libsodium-dev

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 1.8.5
          virtualenvs-create: true
          virtualenvs-in-project: true
          installer-parallel: true

      - name: Load cached venv
        id: cached-poetry-dependencies
        uses: actions/cache@v3
        with:
          path: ./collector-server/k8s-collector/app/.venv
          key: venv-${{ runner.os }}-${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('./collector-server/k8s-collector/app/poetry.lock') }}

      - name: Install dependencies
        working-directory: ./collector-server/k8s-collector/app
        if: steps.cached-poetry-dependencies.outputs.cache-hit != 'true'
        run: poetry install --no-interaction --no-root

      - name: Install project
        working-directory: ./collector-server/k8s-collector/app
        run: poetry install --no-interaction

      - name: Run linters
        working-directory: ./collector-server/k8s-collector/app
        run: |
          poetry run black --check .
          poetry run flake8 .
          poetry run mypy *.py
