{{- if .Values.hasuraDataConnector.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "hasuraDataConnector.fullname" . }}
  labels:
    {{- include "hasuraDataConnector.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.dataConnectorReplicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "hasuraDataConnector.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
      {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "hasuraDataConnector.selectorLabels" . | nindent 8 }}
      {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with (( default .Values.global.imagePullSecrets .Values.imagePullSecrets )) }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "hasuraDataConnector.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.imageDataConnector.repository }}:{{ .Values.imageDataConnector.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.imageDataConnector.pullPolicy }}
          envFrom:
            {{- if .Values.secretNameDataConnector }}
            - secretRef:
                name: {{ .Values.secretNameDataConnector }}
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.dataConnectorPort }}
              protocol: TCP
          resources:
            {{- toYaml .Values.resourcesDataConnector | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}