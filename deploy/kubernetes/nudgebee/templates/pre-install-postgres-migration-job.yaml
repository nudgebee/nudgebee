apiVersion: batch/v1
kind: Job
metadata:
  name: "postgres-migration-job"
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service | quote }}
    app.kubernetes.io/instance: {{ .Release.Name | quote }}
    app.kubernetes.io/version: {{ .Chart.AppVersion }}
    helm.sh/chart: "{{ .Chart.Name }}-{{ .Chart.Version }}"  
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/managed-by: {{ .Release.Service | quote }}
        app.kubernetes.io/instance: {{ .Release.Name | quote }}
        helm.sh/chart: "{{ .Chart.Name }}-{{ .Chart.Version }}"      
    spec:
      restartPolicy: Never
      imagePullSecrets:
          - name: {{ include "nudgebee.registrySecretName" . }}
      containers:
      - name: postgres-migration-job
        image: {{ include "postgresMigrationImageName" . }}
        command: ["sh", "./run-migrations.sh"]
        envFrom:
          - secretRef:
              name: {{ include "nudgebee.secretName" . }}
      initContainers:
        - name: db-check
          image: registry.nudgebee.com/postgres:15.10
          command: ['sh', '-c', 'until pg_isready -h $(echo "$APP_DATABASE_URL" | sed "s/.*@\(.*\):.*/\1/") -U $(echo "$APP_DATABASE_URL" | sed "s/.*:\/\/\([^:]*\):.*/\1/"); do echo "Waiting for PostgreSQL to be ready..."; sleep 2; done;']
          envFrom:
            - secretRef:
                name: {{ include "nudgebee.secretName" . }}
        - name: hasura-check
          image: registry.nudgebee.com/curl:latest
          command: ['sh', '-c', 'until curl -sSf http://hasura/healthz?strict=false; do echo "Waiting for HASURA server to be ready..."; sleep 2; done;']
          envFrom:
            - secretRef:
                name: {{ include "nudgebee.secretName" . }}
        - name: wait-for-api-server
          image: registry.nudgebee.com/curl:latest
          command: ['sh', '-c']
          args:
            - |
              until curl -f $SERVICE_API_SERVER_URL/health; do
                echo "Waiting for API server to be ready..."
                sleep 5
              done
              echo "API server is ready"
          envFrom:
            - secretRef:
                name: {{ include "nudgebee.secretName" . }}
